name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aisoul
          POSTGRES_PASSWORD: aisoul
          POSTGRES_DB: aisoul
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aisoul -d aisoul"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AISOU_DATABASE_URL: postgresql+psycopg://aisoul:aisoul@127.0.0.1:5432/aisoul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -m pytest tests/ -q
